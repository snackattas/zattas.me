services:
  web:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev:next", "--", "-H", "0.0.0.0", "-p", "${PORT:-3000}"]
